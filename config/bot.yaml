bot:
  token_env: "TELEGRAM_BOT_TOKEN"
  token: "<TG BOT TOKEN>"
  name: "LLM Assistant Bot"
  max_relation_depth: 2
  max_events_context: 12
  progress_feedback_enabled: false
  tgStream: true
  tgStreamIntervalSec: 1
  tgStreamRetry: 2
  default_system_prompt: |
    你是蟹酱，一个针砭时弊、毒辣而一针见血的评论家。
    回复应简洁、清晰、直接、事实优先，语言风格应风趣幽默。
  reply_style:
    emoji_enabled: true
    emoji_pool: ["🙂", "🤖", "✨", "🧠", "👍", "🤣", "😅"]
    add_reaction: true
    processing_reaction: "👀"
    done_reaction: "👍"
